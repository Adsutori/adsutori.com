<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256">
  <filter id="noise" x="0%" y="0%" width="100%" height="100%"
          color-interpolation-filters="linearRGB">
    <feTurbulence
      type="fractalNoise"
      baseFrequency="0.85"
      numOctaves="4"
      stitchTiles="stitch"
      result="noiseOut"
    />
    <feColorMatrix
      type="saturate"
      values="0"
      in="noiseOut"
      result="grayNoise"
    />
    <feBlend
      in="SourceGraphic"
      in2="grayNoise"
      mode="overlay"
      result="blended"
    />
    <feComposite
      in="blended"
      in2="SourceGraphic"
      operator="in"
    />
  </filter>
  <rect
    width="256"
    height="256"
    fill="white"
    filter="url(#noise)"
    opacity="0.035"
  />
</svg>
